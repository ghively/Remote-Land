<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAS_TERMINAL — Cyber-Noir Server Management</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="wm-styles.css">
  <link rel="stylesheet" href="xterm.min.css">

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#050505"/>
      <rect x="0" y="0" width="120" height="8" fill="#000800"/>
      <text x="6" y="6" font-size="5" fill="#00f3ff" font-family="monospace">NAS_TERMINAL</text>
      <text x="90" y="6" font-size="4" fill="#00ff00" font-family="monospace">03:14:21</text>
      <rect x="4" y="12" width="54" height="40" rx="2" fill="rgba(10,10,15,0.9)" stroke="#00ff00" stroke-width="0.5" opacity="0.8"/>
      <text x="8" y="20" font-size="4" fill="#00f3ff" font-family="monospace">TERMINAL_SESSION</text>
      <text x="8" y="27" font-size="3.5" fill="#00ff00" font-family="monospace">root@nas:~#</text>
      <text x="8" y="33" font-size="3" fill="#ccffcc" font-family="monospace">$ docker ps</text>
      <text x="8" y="39" font-size="3" fill="#ccffcc" font-family="monospace">emby      Up 2d</text>
      <text x="8" y="45" font-size="3" fill="#ccffcc" font-family="monospace">radarr    Up 5d</text>
      <rect x="62" y="12" width="54" height="40" rx="2" fill="rgba(10,10,15,0.9)" stroke="rgba(0,255,0,0.4)" stroke-width="0.5"/>
      <text x="66" y="20" font-size="4" fill="#00f3ff" font-family="monospace">SYSTEM_MONITOR</text>
      <rect x="66" y="24" width="40" height="3" rx="1" fill="rgba(0,255,0,0.1)" stroke="rgba(0,255,0,0.2)" stroke-width="0.3"/>
      <rect x="66" y="24" width="16" height="3" rx="1" fill="#00ff00"/>
      <text x="108" y="27" font-size="3" fill="#00ff00" font-family="monospace">38%</text>
      <rect x="66" y="30" width="40" height="3" rx="1" fill="rgba(0,255,0,0.1)" stroke="rgba(0,255,0,0.2)" stroke-width="0.3"/>
      <rect x="66" y="30" width="25" height="3" rx="1" fill="#00ff00"/>
      <text x="108" y="33" font-size="3" fill="#00ff00" font-family="monospace">62%</text>
      <rect x="0" y="72" width="120" height="8" fill="#000800"/>
      <text x="4" y="77" font-size="4" fill="rgba(0,255,0,0.5)" font-family="monospace">[LAUNCHER] [+TERM] [FILES] [MONITOR] [DOCKER]</text>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>

  <!-- React (local copies — no CDN required). Babel is NOT loaded at runtime
       anymore; JSX is precompiled into dist/*.js via `node frontend/build.js`. -->
  <script src="react.min.js"></script>
  <script src="react-dom.min.js"></script>

  <!-- xterm.js for the real PTY terminal pane -->
  <script src="xterm.min.js"></script>
  <script src="xterm-addon-fit.min.js"></script>

  <!-- Plain JS REST clients — must load before any component consumer -->
  <script src="api.js"></script>
  <script src="aiClient.js"></script>

  <!-- Precompiled component files (order matters: dependencies first).
       Source lives in *.jsx; rebuild with `node frontend/build.js`. -->
  <script src="dist/BackendContext.js"></script>
  <script src="dist/WindowManager.js"></script>
  <script src="dist/TerminalPane.js"></script>
  <script src="dist/SystemPanels.js"></script>
  <script src="dist/MediaAPIPanels.js"></script>
  <script src="dist/MediaPanelsFull.js"></script>
  <script src="dist/BrowserPanel.js"></script>
  <script src="dist/SettingsPanel.js"></script>
  <script src="dist/AppLauncher.js"></script>
  <script src="dist/AIChatPanel.js"></script>
  <script src="dist/NASTerminal.js"></script>

  <!-- Rainbow border speed shim. The angle itself is animated by pure CSS
       (wm-styles.css :root rule, driven by @property --gradient-angle), so
       there is no per-frame JS work. This shim just exposes the same
       __rainbowSetSpeed(secondsPerRev) API the settings panel uses. -->
  <script>
    window.__rainbowSetSpeed = function (secondsPerRev) {
      var s = Math.max(0.5, Number(secondsPerRev) || 6);
      document.documentElement.style.setProperty('--dur-rotation', s + 's');
    };
  </script>
</body>
</html>
