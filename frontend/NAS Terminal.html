  <script type="text/babel" src="AIChatPanel.jsx"></script>
  <script type="text/babel" src="NASTerminal.jsx"></script>

  <!-- Rainbow border driver — plain script, NOT Babel, so rAF persists correctly -->
  <script>
    (function startRainbow() {
      var angle = 0;
      // 6s per revolution — calm, matches hyprland borderangle loop
      var degPerFrame = 360 / (60 * 6);

      window.__rainbowSetSpeed = function(secondsPerRev) {
        degPerFrame = 360 / (60 * Math.max(0.5, secondsPerRev));
      };

      function tick() {
        angle = (angle + degPerFrame) % 360;
        var grad = 'conic-gradient(from ' + angle + 'deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000)';
        document.documentElement.style.setProperty('--gradient-angle', angle + 'deg');
        // Paint all rings directly
        var rings = document.querySelectorAll('.wm-ring, .rofi-ring');
        for (var i = 0; i < rings.length; i++) {
          rings[i].style.background = grad;
        }
        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    })();
  </script>
</body>
