name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run tests
        timeout-minutes: 5
        run: |
          cd backend
          npm test

      - name: Deploy
        run: |
          /home/ghively/remote-land/backend/scripts/deploy.sh
